services:
  db:
    image: postgres:16
    container_name: todoai-db
    environment:
      POSTGRES_DB: ai_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - todoai_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_database"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: todoai
    container_name: todoai-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=ai_database;Username=postgres;Password=postgres"
      ASPNETCORE_URLS: "http://+:5114"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5114:5114"

volumes:
  todoai_pg: